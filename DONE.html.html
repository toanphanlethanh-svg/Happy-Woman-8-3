<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:white;
width:500px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
position:relative;
z-index:2;
}

h1{
color:#ff4d6d;
}

button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e63950;
}

.letter{
margin-top:20px;
text-align:left;
line-height:1.6;
font-size:18px;
}

.fall{
position:fixed;
top:-50px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>

<body>

<div class="card">

<h1>Happy Women's Day 8/3 🌸</h1>

<button onclick="showLetter()">Mở thư 💌</button>

<div id="letter" class="letter"></div>

</div>

<!-- Nhạc nền -->
<audio id="music" loop>
<source src="cam-on-nguoi-da-thuc-cung-toi-phung-khanh-linh-nhacchuongwow.com (1).mp3" type="audio/mpeg">
</audio>

<script>

function showLetter(){

/* hiện thư */
document.getElementById("letter").innerHTML=
"<p><b>Chúc mừng ngày 8/3 nhé tình yêu của anh!</b></p>"+
"<p>Cảm ơn vì đã luôn ở bên lắng nghe những câu chuyện 'không đầu không đuôi' của anh.</p>"+
"<p>Chúc em ngày càng xinh đẹp, độc lập, tự tin và luôn có nhiều niềm vui trong cuộc sống.</p>"+
"<p>Đừng quên là dù thế nào thì vẫn luôn có anh ủng hộ em nhé! 💙</p>";

/* phát nhạc */
document.getElementById("music").play();

}

function createFalling(){

const icons=["⭐","🌷"];

for(let i=0;i<40;i++){

let item=document.createElement("div");

item.className="fall";

item.innerHTML=icons[Math.floor(Math.random()*icons.length)];

item.style.left=Math.random()*100+"vw";

item.style.fontSize=(20+Math.random()*20)+"px";

item.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(item);

}

}

createFalling();

</script>

</body>
</html>
